spring.application.name=expence-service

server.port=8083

#database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.naviyfnqtkimwjohuabz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:benjiro!344}
spring.datasource.driver-class-name=org.postgresql.Driver

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true
eureka.instance.status-page-url-path=/actuator/info
eureka.instance.health-check-url-path=/actuator/health

# diableing eureka client
# eureka.client.enabled=false
# spring.cloud.discovery.enabled=false
# eureka.client.register-with-eureka=false
# eureka.client.fetch-registry=false

# ADD THESE LINES
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

# HikariCP settings tuned for Supabase pooler
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=2
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=30000
spring.datasource.hikari.prepareThreshold=0
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.prepareThreshold=0

#Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

#Actuator
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#resilience4j
resilience4j.circuitbreaker.instances.expenceBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.expenceBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.expenceBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.expenceBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.expenceBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.expenceBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.expenceBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.expenceBreaker.automatic-transaction-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.expenceBreaker.max-attempts=5
resilience4j.circuitbreaker.instances.expenceBreaker.wait-duration=2s

