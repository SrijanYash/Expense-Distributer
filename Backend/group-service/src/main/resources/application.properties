# ADD THESE LINES
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

#Zipkin
management.tracing.sampling.probability=1

#Actuator
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#resilience4j
resilience4j.circuitbreaker.instances.groupBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.groupBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.groupBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.groupBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.groupBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.groupBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.groupBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.groupBreaker.automatic-transaction-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.groupBreaker.max-attempts=5
resilience4j.circuitbreaker.instances.groupBreaker.wait-duration=2s

