spring.application.name=user-service

server.port=${SERVER_PORT:8081}

#database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.naviyfnqtkimwjohuabz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Eureka
eureka.client.service-url.defaultZone=http://eureka:8761/eureka/
# eureka.client.register-with-eureka=true
# eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true
eureka.instance.status-page-url-path=/actuator/info
eureka.instance.health-check-url-path=/actuator/health

# diableing eureka client
eureka.client.enabled=${EUREKA_ZIPKIN_ENABLED}
spring.cloud.discovery.enabled=${EUREKA_ZIPKIN_ENABLED}
eureka.client.register-with-eureka=${EUREKA_ZIPKIN_ENABLED}
eureka.client.fetch-registry=${EUREKA_ZIPKIN_ENABLED}

# # ADD THESE LINES
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

#Zipkin
management.tracing.enabled=${EUREKA_ZIPKIN_ENABLED}
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

#Actuator
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# HikariCP settings tuned for Supabase pooler
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=2
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=30000
spring.datasource.hikari.prepareThreshold=0
spring.datasource.hikari.connection-test-query=SELECT 1

#resilience4j
resilience4j.circuitbreaker.instances.userBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.userBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.userBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.userBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.userBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.userBreaker.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.userBreaker.max-attempts=5
resilience4j.retry.instances.userBreaker.wait-duration=2s

