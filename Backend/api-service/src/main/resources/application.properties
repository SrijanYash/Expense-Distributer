spring.application.name=api-service

server.port=${SERVER_PORT:8085}

#Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true
eureka.instance.status-page-url-path=/actuator/info
eureka.instance.health-check-url-path=/actuator/health


# ADD THESE LINES
eureka.instance.prefer-ip-address=false
# eureka.instance.hostname=localhost
# eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

# HikariCP settings tuned for Supabase pooler
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=2
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=45000

#Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Gateway routes (new key namespace for Spring Cloud 2025+)
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webflux.routes[0].metadata.response-timeout=30000
spring.cloud.gateway.server.webflux.routes[0].metadata.connect-timeout=30000

spring.cloud.gateway.server.webflux.routes[1].id=group-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://GROUP-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/group/**
spring.cloud.gateway.server.webflux.routes[1].metadata.response-timeout=30000
spring.cloud.gateway.server.webflux.routes[1].metadata.connect-timeout=30000

spring.cloud.gateway.server.webflux.routes[2].id=expence-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://EXPENCE-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/expence/**
spring.cloud.gateway.server.webflux.routes[2].metadata.response-timeout=30000
spring.cloud.gateway.server.webflux.routes[2].metadata.connect-timeout=30000

spring.cloud.gateway.server.webflux.routes[3].id=user-group-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://USER-GROUP-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/user-group/**
spring.cloud.gateway.server.webflux.routes[3].metadata.response-timeout=30000
spring.cloud.gateway.server.webflux.routes[3].metadata.connect-timeout=30000

# optional compatibility for clients using camelCase path
spring.cloud.gateway.server.webflux.routes[4].id=user-group-service-alt
spring.cloud.gateway.server.webflux.routes[4].uri=lb://USER-GROUP-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/userGroup/**
spring.cloud.gateway.server.webflux.routes[4].metadata.response-timeout=30000
spring.cloud.gateway.server.webflux.routes[4].metadata.connect-timeout=30000

# Global timeout settings
spring.cloud.gateway.server.webflux.httpclient.connect-timeout=30000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=30000

# Global CORS for Gateway (new key namespace)
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://expense-distributer.vercel.app,https://expense-distributer.vercel.app
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true

logging.level.root=info
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.netflix.eureka=DEBUG

#Actuator
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
