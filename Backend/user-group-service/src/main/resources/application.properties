spring.application.name=user-group-service

server.port=8084

#database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.platform=org.hibernate.dialect.PostgreSQLDialect

#Eureka
eureka.client.service-url.defaultZone=http://eureka:8761/eureka/
# eureka.client.register-with-eureka=true
# eureka.client.fetch-registry=true

# diableing eureka client
eureka.client.enabled=${EUREKA_ZIPKIN_ENABLED}
spring.cloud.discovery.enabled=${EUREKA_ZIPKIN_ENABLED}
eureka.client.register-with-eureka=${EUREKA_ZIPKIN_ENABLED}
eureka.client.fetch-registry=${EUREKA_ZIPKIN_ENABLED}

# ADD THESE LINES
eureka.instance.prefer-ip-address=false
# eureka.instance.hostname=localhost
# eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

# HikariCP settings tuned for Supabase pooler
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=2
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=45000

#Zipkin
management.tracing.enabled=${EUREKA_ZIPKIN_ENABLED}
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

#Actuator
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#resilience4j
resilience4j.circuitbreaker.instances.userGroupBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.userGroupBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.userGroupBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.userGroupBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userGroupBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.userGroupBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userGroupBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.userGroupBreaker.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.userGroupBreaker.max-attempts=5
resilience4j.retry.instances.userGroupBreaker.wait-duration=2s
resilience4j.circuitbreaker.instances.userGroupBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.userGroupBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.userGroupBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userGroupBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.userGroupBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userGroupBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.userGroupBreaker.automatic-transaction-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.userGroupBreaker.max-attempts=5
resilience4j.circuitbreaker.instances.userGroupBreaker.wait-duration=2s

